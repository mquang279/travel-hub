spring.application.name=travel-hub
spring.devtools.restart.log-condition-evaluation-delta=false
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:main/.env[.properties]
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
secret.key=${SECRET_TOKEN:dev-secret-change-me}
access.token.expiration.time=900
refresh.token.expiration.time=36000
minio.bucket=travelhub
minio.username=minioadmin
minio.password=minioadmin
minio.url=https://play.min.io:9000
minio.public.url=https://play.min.io:9000
app.firebase-config=src/main/resources/travel-hub-b557d-firebase-adminsdk-fbsvc-2c022ec6e4.json

ai.base-url=http://localhost:8888

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
